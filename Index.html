<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizCraft — Test Your Knowledge</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>
 
  <!-- ── START SCREEN ── -->
  <div id="start-screen" class="screen active">
    <div class="card start-card">
      <div class="logo-ring">
        <span class="logo-icon">⚡</span>
      </div>
      <h1 class="brand">QuizCraft</h1>
      <p class="tagline">10 seconds per question.<br>How sharp are you?</p>
      <ul class="rules">
        <li><span class="dot"></span>5 questions, 4 choices each</li>
        <li><span class="dot"></span>10-second timer per question</li>
        <li><span class="dot"></span>Instant answer feedback</li>
        <li><span class="dot"></span>Final score with grade</li>
      </ul>
      <button id="start-btn" class="btn btn-primary">Start Quiz →</button>
    </div>
  </div>
 
  <!-- ── QUIZ SCREEN ── -->
  <div id="quiz-screen" class="screen">
    <div class="card quiz-card">
 
      <!-- Header -->
      <div class="quiz-header">
        <span id="question-counter" class="counter">Question 1 of 5</span>
        <div class="timer-wrap">
          <svg class="timer-ring" viewBox="0 0 36 36">
            <circle class="ring-bg" cx="18" cy="18" r="15.9" />
            <circle id="timer-ring-fill" class="ring-fill" cx="18" cy="18" r="15.9" />
          </svg>
          <span id="timer-display" class="timer-num">10</span>
        </div>
      </div>
 
      <!-- Progress Bar -->
      <div class="progress-track">
        <div id="progress-bar" class="progress-fill"></div>
      </div>
 
      <!-- Question -->
      <div id="question-area" class="question-area">
        <p id="question-text" class="question-text"></p>
      </div>
 
      <!-- Options -->
      <div id="options-grid" class="options-grid"></div>
 
      <!-- Next Button -->
      <div class="next-wrap">
        <button id="next-btn" class="btn btn-next hidden">Next Question →</button>
      </div>
 
    </div>
  </div>
 
  <!-- ── RESULT SCREEN ── -->
  <div id="result-screen" class="screen">
    <div class="card result-card">
      <div id="result-trophy" class="trophy-wrap">🏆</div>
      <h2 id="result-title" class="result-title">Great Job!</h2>
      <div class="score-display">
        <span id="score-fraction" class="score-frac">4 / 5</span>
        <span id="score-percent" class="score-pct">80%</span>
      </div>
      <p id="result-message" class="result-msg"></p>
      <div class="result-breakdown" id="result-breakdown"></div>
      <button id="restart-btn" class="btn btn-primary">↺ Restart Quiz</button>
    </div>
  </div>
 
  <script src="script.js"></script>
</body>
</html>
